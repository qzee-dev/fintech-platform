version: '3.9'

services:
  # PostgreSQL Main Database
  postgres:
    image: postgres:15-alpine
    container_name: fintech-postgres
    environment:
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_secure_password
      POSTGRES_DB: fintech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech_user -d fintech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fintech-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fintech-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fintech-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fintech-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: fintech
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - fintech-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: fintech-user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Wallet Service
  wallet-service:
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    container_name: fintech-wallet-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:29092
      PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - ./services/wallet-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Transaction Service
  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: fintech-transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:29092
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - ./services/transaction-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Payment Service
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: fintech-payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:29092
      NIBSS_API_URL: http://nibss-mock:3007
      PORT: 3004
    ports:
      - "3004:3004"
    volumes:
      - ./services/payment-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Fraud Service
  fraud-service:
    build:
      context: ./services/fraud-service
      dockerfile: Dockerfile
    container_name: fintech-fraud-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:29092
      FRAUD_THRESHOLD: 500000
      PORT: 3005
    ports:
      - "3005:3005"
    volumes:
      - ./services/fraud-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: fintech-notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:29092
      TWILIO_ACCOUNT_SID: your-twilio-sid
      TWILIO_AUTH_TOKEN: your-twilio-token
      TWILIO_PHONE: +1234567890
      SENDGRID_API_KEY: your-sendgrid-key
      PORT: 3006
    ports:
      - "3006:3006"
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
    networks:
      - fintech-network

  # NIBSS Mock Service
  nibss-mock:
    build:
      context: ./mock-services/nibss-mock
      dockerfile: Dockerfile
    container_name: fintech-nibss-mock
    environment:
      NODE_ENV: development
      PORT: 3007
    ports:
      - "3007:3007"
    volumes:
      - ./mock-services/nibss-mock:/app
      - /app/node_modules
    networks:
      - fintech-network

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: fintech-api-gateway
    depends_on:
      - user-service
      - wallet-service
      - transaction-service
      - payment-service
      - fraud-service
      - notification-service
    environment:
      NODE_ENV: development
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      WALLET_SERVICE_URL: http://wallet-service:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      FRAUD_SERVICE_URL: http://fraud-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    ports:
      - "3000:3000"
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    networks:
      - fintech-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech-frontend
    depends_on:
      - api-gateway
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_WS_URL: ws://localhost:3000
    ports:
      - "3000:80"
    networks:
      - fintech-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: fintech-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - fintech-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: fintech-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3010:3000"
    networks:
      - fintech-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  fintech-network:
    driver: bridge
