version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_secure_password
      POSTGRES_DB: fintech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - fintech-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    networks:
      - fintech-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - fintech-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      WALLET_SERVICE_URL: http://wallet-service:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      FRAUD_SERVICE_URL: http://fraud-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      - user-service
      - wallet-service
      - transaction-service
      - payment-service
      - fraud-service
      - notification-service
    networks:
      - fintech-network

  # User Service
  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      - postgres
      - redis
    networks:
      - fintech-network

  # Wallet Service
  wallet-service:
    build: ./services/wallet-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - fintech-network

  # Transaction Service
  transaction-service:
    build: ./services/transaction-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - fintech-network

  # Payment Service
  payment-service:
    build: ./services/payment-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:9092
      NIBSS_API_URL: http://nibss-mock:3007
    depends_on:
      - postgres
      - kafka
      - nibss-mock
    networks:
      - fintech-network

  # Fraud Service
  fraud-service:
    build: ./services/fraud-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://fintech_user:fintech_secure_password@postgres:5432/fintech_db
      KAFKA_BROKERS: kafka:9092
      FRAUD_THRESHOLD: 500000
    depends_on:
      - postgres
      - kafka
    networks:
      - fintech-network

  # Notification Service
  notification-service:
    build: ./services/notification-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      KAFKA_BROKERS: kafka:9092
      EMAIL_USER: noreply@fintech.com
      EMAIL_PASSWORD: your-app-password
      TWILIO_ACCOUNT_SID: your-twilio-sid
      TWILIO_AUTH_TOKEN: your-twilio-token
      TWILIO_PHONE: your-twilio-phone
    depends_on:
      - kafka
    networks:
      - fintech-network

  # NIBSS Mock Service
  nibss-mock:
    build: ./mock-services/nibss-mock
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
    networks:
      - fintech-network

  # React Frontend
  web:
    build: ./web
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3000/api
    depends_on:
      - api-gateway
    networks:
      - fintech-network

volumes:
  postgres_data:

networks:
  fintech-network:
    driver: bridge
